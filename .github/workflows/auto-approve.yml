name: Auto Approve

on:
  pull_request:
    types:
      - opened
      - reopened
      - ready_for_review

jobs:
  auto-approve:
    if: |
      github.event.pull_request.user.login == github.repository_owner
      && ! github.event.pull_request.draft
    runs-on: ubuntu-slim
    permissions:
      pull-requests: write
    steps:
      - uses: hmarr/auto-approve-action@44888193675f29a83e04faf4002fa8c0b537b1e4 # v3.2.1
